name: CI/CD Multi-Env Docker (GHCR)

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ 设置 Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      # 3️⃣ 安装依赖
      - name: Install Dependencies
        run: npm install

      # 4️⃣ 单元测试
      - name: Run Unit Tests
        run: npm run test --if-present

      # 5️⃣ 构建 Vue 项目
      - name: Build Vue Project
        run: npm run build

      # 6️⃣ 登录 GHCR（CI runner）
      - name: Login GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 7️⃣ 构建 Docker 镜像
      - name: Build Docker Image
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            IMAGE_TAG=production
          else
            IMAGE_TAG=development
          fi
          docker build \
          -t ghcr.io/${{ github.repository }}/vue-demo:$IMAGE_TAG-latest \ 
          -t ghcr.io/${{ github.repository }}/vue-demo:$IMAGE_TAG-${{ github.sha }} .

      # 8️⃣ 推送镜像到 GHCR
      - name: Push Docker Image to GHCR
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            IMAGE_TAG=production
          else
            IMAGE_TAG=development
          fi
          docker push ghcr.io/${{ github.repository }}/vue-demo:$IMAGE_TAG-latest
          docker push ghcr.io/${{ github.repository }}/vue-demo:$IMAGE_TAG-${{ github.sha }}

      # 9️⃣ 部署到服务器
      - name: Deploy to Server
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_PAT,GITHUB_ACTOR,GITHUB_REF_NAME,GITHUB_REPOSITORY
          script: |
            echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
            echo "GITHUB_ACTOR=$GITHUB_ACTOR"
            echo "GHCR_PAT=[REDACTED]"
            echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"

            # 登录 GHCR（服务器端）
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            
            # 判断环境
            if [[ "$GITHUB_REF_NAME" == "main" ]]; then
              IMAGE_TAG=production
              PORT=8088
              CONTAINER_NAME=vue-demo-production
            else
              IMAGE_TAG=development
              PORT=8089
              CONTAINER_NAME=vue-demo-development
            fi

            echo "Deploying $IMAGE_TAG to server (branch: $GITHUB_REF_NAME, container: $CONTAINER_NAME, port: $PORT)"

            # 拉取最新镜像
            docker pull ghcr.io/$GITHUB_REPOSITORY/vue-demo:$IMAGE_TAG-latest

            # 停止旧容器（只停止当前环境的容器）
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            # 启动新容器
            docker run -d -p $PORT:80 --name $CONTAINER_NAME ghcr.io/$GITHUB_REPOSITORY/vue-demo:$IMAGE_TAG-latest
